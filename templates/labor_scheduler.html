{% extends "base.html" %}
{% block title %}Labor Scheduler — 3·2·1→Theater{% endblock %}

{% block head %}
<style>
  .scheduler-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .scheduler-filter .field-group { display: flex; flex-direction: column; gap: 4px; }
  .scheduler-filter label { font-size: 11px; letter-spacing: .04em; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }
  .scheduler-filter input[type=date] { min-width: 160px; }
  .scheduler-show-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .scheduler-show-header .show-link {
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
  }
  .scheduler-show-header .show-link:hover { color: var(--accent); text-decoration: underline; }
  .scheduler-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .sched-check-cell { text-align: center; }
  .sched-check-cell input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
  .scheduled-row { background: rgba(72, 187, 120, 0.08); }
  .sched-time-input {
    width: 74px;
    padding: 3px 5px;
    font-size: 12px;
    font-family: var(--font-mono, monospace);
    text-align: center;
    background: var(--bg-input, var(--bg-surface));
    border: 1px solid var(--border);
    border-radius: var(--radius-sm, 4px);
    color: var(--text);
  }
  .sched-time-input:focus { outline: none; border-color: var(--accent); }
  .sched-add-row { font-size: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Labor Scheduler</h1>
    <p class="page-sub">Pick a date range to see all labor requests grouped by show. Schedule positions and assign technicians.</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="window.__scheduler.saveAll()">Save All</button>
  </div>
</div>

<div class="form-section">
  <div class="form-section-body">
    <div class="scheduler-filter">
      <div class="field-group">
        <label for="sched-from">From</label>
        <input type="date" id="sched-from" class="field-input">
      </div>
      <div class="field-group">
        <label for="sched-to">To</label>
        <input type="date" id="sched-to" class="field-input">
      </div>
      <button type="button" class="btn btn-primary" onclick="loadScheduler()">Load</button>
      <span id="sched-status" class="text-dim" style="font-size:12px"></span>
    </div>
  </div>
</div>

<div id="scheduler-results"></div>

<script>
(function() {
  let _crewMembers = null;
  let _positions   = null;

  function fmtDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function setDefaultRange() {
    const today = new Date();
    const twoWeeks = new Date(today.getTime() + 14 * 24 * 60 * 60 * 1000);
    document.getElementById('sched-from').value = fmtDate(today);
    document.getElementById('sched-to').value = fmtDate(twoWeeks);
  }

  async function loadCrew() {
    if (_crewMembers) return _crewMembers;
    const r = await fetch('/api/crew-members');
    _crewMembers = await r.json();
    return _crewMembers;
  }

  async function loadPositions() {
    if (_positions) return _positions;
    const r = await fetch('/api/job-positions');
    const data = await r.json();
    _positions = Array.isArray(data) ? data : (data.positions || []);
    return _positions;
  }

  function buildTechnicianSelect(selectEl, positionId, selectedId) {
    selectEl.innerHTML = '';
    const anyOpt = document.createElement('option');
    anyOpt.value = '';
    anyOpt.textContent = '— Unassigned —';
    selectEl.appendChild(anyOpt);
    if (!_crewMembers || !_crewMembers.length) return;
    if (positionId) {
      const qualified = _crewMembers.filter(m => (m.qualifications || []).includes(positionId));
      const others    = _crewMembers.filter(m => !(m.qualifications || []).includes(positionId));
      if (qualified.length) {
        const og = document.createElement('optgroup');
        og.label = 'Qualified';
        qualified.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          if (String(m.id) === String(selectedId)) opt.selected = true;
          og.appendChild(opt);
        });
        selectEl.appendChild(og);
      }
      if (others.length) {
        const og = document.createElement('optgroup');
        og.label = 'Others';
        others.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          if (String(m.id) === String(selectedId)) opt.selected = true;
          og.appendChild(opt);
        });
        selectEl.appendChild(og);
      }
    } else {
      _crewMembers.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        if (String(m.id) === String(selectedId)) opt.selected = true;
        selectEl.appendChild(opt);
      });
    }
  }

  function buildPositionSelect(selectEl, selectedId) {
    selectEl.innerHTML = '<option value="">— Position —</option>';
    if (!_positions) return;
    const byCat = {};
    _positions.forEach(p => {
      const c = p.category_name || 'Other';
      if (!byCat[c]) byCat[c] = [];
      byCat[c].push(p);
    });
    for (const [cat, positions] of Object.entries(byCat)) {
      const og = document.createElement('optgroup');
      og.label = cat;
      positions.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name + (p.venue ? ` (${p.venue})` : '');
        if (String(p.id) === String(selectedId)) opt.selected = true;
        og.appendChild(opt);
      });
      selectEl.appendChild(og);
    }
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function buildRow(lr) {
    const tr = document.createElement('tr');
    tr.dataset.rid = lr.id;
    if (lr.is_scheduled) tr.classList.add('scheduled-row');
    tr.innerHTML = `
      <td class="sched-check-cell">
        <input type="checkbox" class="sched-check" ${lr.is_scheduled ? 'checked' : ''}
               onchange="window.__scheduler.onScheduledToggle(this)">
      </td>
      <td style="font-size:12px;color:var(--text-dim)">${escapeHtml(lr.work_date || '—')}</td>
      <td>
        <select class="field-input field-input-sm sched-pos" style="min-width:150px"
                onchange="window.__scheduler.onPositionChange(this)">
        </select>
      </td>
      <td><input type="text" class="sched-time-input sched-in"   value="${escapeHtml(lr.in_time||'')}"    placeholder="HH:MM" maxlength="5"
                 onchange="window.__scheduler.onTimeChange(this)"></td>
      <td><input type="text" class="sched-time-input sched-bstart" value="${escapeHtml(lr.break_start||'')}" placeholder="HH:MM" maxlength="5"
                 onchange="window.__scheduler.onTimeChange(this)"></td>
      <td><input type="text" class="sched-time-input sched-bend"  value="${escapeHtml(lr.break_end||'')}"  placeholder="HH:MM" maxlength="5"
                 onchange="window.__scheduler.onTimeChange(this)"></td>
      <td><input type="text" class="sched-time-input sched-out"  value="${escapeHtml(lr.out_time||'')}"   placeholder="HH:MM" maxlength="5"
                 onchange="window.__scheduler.onTimeChange(this)"></td>
      <td style="font-size:12px;color:var(--text-dim)">${escapeHtml(lr.requested_name || '—')}</td>
      <td>
        <select class="field-input field-input-sm sched-tech"
                data-position-id="${lr.position_id || ''}"
                data-selected-id="${lr.scheduled_crew_member_id || ''}"
                onchange="window.__scheduler.onCrewChange(this)">
        </select>
      </td>
      <td style="text-align:center">
        <button class="btn btn-xs btn-danger-ghost" onclick="window.__scheduler.removeRow(this)" title="Remove line">×</button>
      </td>
    `;
    // Build position select
    const posSel = tr.querySelector('.sched-pos');
    buildPositionSelect(posSel, lr.position_id);
    posSel.addEventListener('change', () => {
      const newPid = parseInt(posSel.value) || null;
      const techSel = tr.querySelector('.sched-tech');
      buildTechnicianSelect(techSel, newPid, '');
    });
    // Build technician select
    const techSel = tr.querySelector('.sched-tech');
    buildTechnicianSelect(techSel, lr.position_id, lr.scheduled_crew_member_id);
    return tr;
  }

  function renderShows(shows) {
    const container = document.getElementById('scheduler-results');
    if (!shows.length) {
      container.innerHTML = '<div class="form-section"><div class="form-section-body"><div class="scheduler-empty">No labor requests found in this date range.</div></div></div>';
      return;
    }
    container.innerHTML = '';

    shows.forEach(show => {
      const section = document.createElement('div');
      section.className = 'form-section';
      section.style.marginBottom = '16px';
      section.dataset.showId = show.show_id;

      const header = document.createElement('div');
      header.className = 'form-section-header';
      header.innerHTML = `
        <span class="section-icon">◈</span>
        <div class="scheduler-show-header">
          <strong style="text-transform:none;letter-spacing:normal;font-size:14px">${escapeHtml(show.show_name)}</strong>
          <span class="text-dim" style="font-size:11px">
            ${escapeHtml(show.show_venue || '')}${show.show_date ? ' · ' + escapeHtml(show.show_date) : ''}
          </span>
          <a href="/shows/${show.show_id}?tab=staffing" class="show-link" target="_blank" rel="noopener">Open show →</a>
        </div>
        <button class="btn btn-ghost btn-sm ml-auto" onclick="window.__scheduler.addRow(this, ${show.show_id})">+ Add Line</button>
      `;
      section.appendChild(header);

      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'form-section-body no-pad';

      const table = document.createElement('table');
      table.className = 'data-table';
      table.innerHTML = `
        <thead>
          <tr>
            <th style="width:52px;text-align:center">SCHED ✓</th>
            <th style="width:110px">DATE</th>
            <th style="min-width:160px">POSITION</th>
            <th style="width:80px">IN</th>
            <th style="width:80px">LUNCH START</th>
            <th style="width:80px">LUNCH END</th>
            <th style="width:80px">OUT</th>
            <th style="width:140px">REQUESTED</th>
            <th>SCHEDULED TECH</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
      `;
      const tbody = document.createElement('tbody');
      show.requests.forEach(lr => tbody.appendChild(buildRow(lr)));
      table.appendChild(tbody);
      bodyWrap.appendChild(table);
      section.appendChild(bodyWrap);
      container.appendChild(section);
    });
  }

  async function loadScheduler() {
    const from = document.getElementById('sched-from').value;
    const to   = document.getElementById('sched-to').value;
    const status = document.getElementById('sched-status');
    if (!from || !to) {
      status.textContent = 'Pick both dates.';
      return;
    }
    status.textContent = 'Loading…';
    try {
      await Promise.all([loadCrew(), loadPositions()]);
      const r = await fetch(`/api/labor-scheduler?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
      if (!r.ok) {
        status.textContent = 'Failed to load.';
        return;
      }
      const data = await r.json();
      renderShows(data.shows || []);
      const total = (data.shows || []).reduce((n, s) => n + s.requests.length, 0);
      status.textContent = `${total} request${total === 1 ? '' : 's'} across ${data.shows.length} show${data.shows.length === 1 ? '' : 's'}.`;
    } catch (e) {
      status.textContent = 'Error loading data.';
      console.error(e);
    }
  }

  async function putSchedulerUpdate(rid, payload) {
    const r = await fetch(`/api/labor-scheduler/${rid}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      showSaveToast('✗ Save failed', 'error');
      return null;
    }
    showSaveToast('✓ Saved');
    return await r.json();
  }

  async function onScheduledToggle(checkbox) {
    const tr = checkbox.closest('tr');
    const rid = tr.dataset.rid;
    const val = checkbox.checked;
    tr.classList.toggle('scheduled-row', val);
    const res = await putSchedulerUpdate(rid, { is_scheduled: val });
    if (!res || !res.success) {
      checkbox.checked = !val;
      tr.classList.toggle('scheduled-row', !val);
    }
  }

  async function onCrewChange(select) {
    const tr = select.closest('tr');
    const rid = tr.dataset.rid;
    await putSchedulerUpdate(rid, { scheduled_crew_member_id: select.value || null });
  }

  async function onPositionChange(select) {
    const tr = select.closest('tr');
    const rid = tr.dataset.rid;
    await putSchedulerUpdate(rid, { position_id: parseInt(select.value) || null });
  }

  async function onTimeChange(input) {
    const tr = input.closest('tr');
    const rid = tr.dataset.rid;
    const payload = {
      in_time:     tr.querySelector('.sched-in').value.trim(),
      break_start: tr.querySelector('.sched-bstart').value.trim(),
      break_end:   tr.querySelector('.sched-bend').value.trim(),
      out_time:    tr.querySelector('.sched-out').value.trim(),
    };
    await putSchedulerUpdate(rid, payload);
  }

  async function addRow(btn, showId) {
    const workDate = document.getElementById('sched-from').value || null;
    const r = await fetch('/api/labor-scheduler/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ show_id: showId, work_date: workDate }),
    });
    if (!r.ok) { showSaveToast('✗ Add failed', 'error'); return; }
    const data = await r.json();
    if (!data.success) { showSaveToast('✗ ' + (data.error || 'Add failed'), 'error'); return; }
    const section = btn.closest('.form-section');
    const tbody = section.querySelector('tbody');
    const newRow = buildRow(data.row);
    tbody.appendChild(newRow);
    showSaveToast('✓ Row added');
  }

  async function removeRow(btn) {
    const tr = btn.closest('tr');
    const rid = tr.dataset.rid;
    if (!rid) { tr.remove(); return; }
    if (!confirm('Remove this labor line?')) return;
    const r = await fetch(`/api/labor-scheduler/${rid}`, { method: 'DELETE' });
    if (!r.ok) { showSaveToast('✗ Delete failed', 'error'); return; }
    tr.remove();
    showSaveToast('✓ Removed');
  }

  async function saveAll() {
    const rows = document.querySelectorAll('#scheduler-results tr[data-rid]');
    if (!rows.length) { showSaveToast('Nothing to save'); return; }
    let ok = 0, fail = 0;
    for (const tr of rows) {
      const rid = tr.dataset.rid;
      const isScheduled = tr.querySelector('.sched-check')?.checked ? true : false;
      const crewId = tr.querySelector('.sched-tech')?.value || null;
      const positionId = parseInt(tr.querySelector('.sched-pos')?.value) || null;
      const in_time    = tr.querySelector('.sched-in')?.value.trim()     || '';
      const break_start= tr.querySelector('.sched-bstart')?.value.trim() || '';
      const break_end  = tr.querySelector('.sched-bend')?.value.trim()   || '';
      const out_time   = tr.querySelector('.sched-out')?.value.trim()    || '';
      const r = await fetch(`/api/labor-scheduler/${rid}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ is_scheduled: isScheduled, scheduled_crew_member_id: crewId,
                               position_id: positionId, in_time, break_start, break_end, out_time }),
      });
      if (r.ok) ok++; else fail++;
    }
    if (fail) showSaveToast(`✗ ${fail} failed, ${ok} saved`, 'error');
    else showSaveToast(`✓ All ${ok} rows saved`);
  }

  window.__scheduler = { onScheduledToggle, onCrewChange, onPositionChange, onTimeChange, addRow, removeRow, saveAll };
  window.loadScheduler = loadScheduler;

  document.addEventListener('DOMContentLoaded', () => {
    setDefaultRange();
    loadScheduler();
  });
})();
</script>
{% endblock %}
